name: Semgrep (Reusable)

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  semgrep:
    name: Scan
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.SEMGREP_RULES_APP_ID }}
          private-key: ${{ secrets.SEMGREP_RULES_APP_PRIVATE_KEY }}
          owner: p0-security
          repositories: p0-semgrep-rules

      - uses: actions/checkout@v4
        with:
          repository: p0-security/p0-semgrep-rules
          path: .semgrep-org-rules
          token: ${{ steps.app-token.outputs.token }}

      - name: Run Semgrep (PR diff scan)
        if: github.event_name == 'pull_request'
        run: semgrep scan --config auto --config .semgrep-org-rules/ --baseline-commit ${{ github.event.pull_request.base.sha }}

      - name: Run Semgrep (full scan)
        if: github.event_name != 'pull_request'
        run: semgrep scan --config auto --config .semgrep-org-rules/
        continue-on-error: true
